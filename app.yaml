# =============================================================================
# Plánovač terasy — deklarativní Estoflow workbench
# -----------------------------------------------------------------------------
# Material-agnostický kalkulátor terasy: uživatel zakreslí plochu terasy
# (a případné výřezy) na výkres, zvolí materiál a parametry pokládky a dostane
# kompletní kusovník včetně podkonstrukce a brandovanou cenovou nabídku.
#
# Firemní identita v panelu (TerasProfi s.r.o. / PlanTeras.cz) je FIKTIVNÍ
# placeholder — snadno přepsatelný.
#
# Modely:   TerraceConfig  — vstupní model kalkulátoru; jedna varianta = jeden řádek.
#                            Drží VŠECHNO: materiál, rozměry, podkonstrukci, služby
#                            a navíc vlastní ceník + parametry kalkulace (per-varianta).
#           TerraceSurface — zakreslená plocha terasy (rect/polygon), derivace area+perimeter
#           TerraceObstacle— zakreslený výřez/překážka (bazén, truhlík), derivace area
# Nástroje: terrace-surface, terrace-obstacle
# Kalkulátor: terrace — JEDEN sjednocený kalkulátor, 6 kroků
#             (Materiál · Rozměry · Podkonstrukce · Služby · Ceník · Parametry)
# Agregace: terraceBOM (kusovník), terraceTakeoff (výkaz výměr), terraceWarnings (kontrola)
# Pohledy:  bom, takeoff, warnings
# Panel:    quote — cenová nabídka TerasProfi s.r.o.
# =============================================================================

app:
  id: terrace-planner
  name: Plánovač terasy
  requiresSketch: true

# =============================================================================
# Models
# =============================================================================
models:

  # --- Vstupní model kalkulátoru → jsonforms data schema --------------------
  TerraceConfig:
    x-entity: terrace_configs
    x-required-for-save: [project_id, name]
    title: Konfigurace terasy
    description: Vstupní parametry jedné varianty terasy.
    properties:
      project_id: { type: [string, "null"] }
      name:
        type: string
        default: ''
        title: Název varianty

      # -- Krok 1 · Materiál -------------------------------------------------
      material:
        type: string
        default: wpc
        format: entity-select
        x-options-resolver: resolveCfgMaterial
        title: Materiál povrchu
      boardColor:
        type: string
        default: antracit
        format: entity-select
        x-options-resolver: resolveBoardColor
        title: Barva (WPC)
      layingDirection:
        type: string
        default: podel
        format: entity-select
        x-options-resolver: resolveCfgLayingDirection
        title: Směr pokládky
        description: Diagonální pokládka zvyšuje odpad materiálu.
      boardWidth:
        type: number
        default: 140
        minimum: 50
        title: Šířka prkna
        description: Krycí šířka jednoho prkna — určuje rozteč vzoru a počet kusů.
        unit: mm
      boardMaxLength:
        type: number
        default: 4000
        minimum: 1000
        title: Maximální délka prkna
        description: Nejdelší dodávané prkno — určuje krycí plochu jednoho kusu.
        unit: mm
      boardGap:
        type: number
        default: 5
        minimum: 4
        maximum: 8
        title: Dilatační mezera mezi prkny
        description: Spára mezi prkny (4–8 mm). Větší mezera = méně prken, ale širší spáry.
        unit: mm
      tilePattern:
        type: string
        default: rovny
        format: entity-select
        x-options-resolver: resolveCfgTilePattern
        title: Vzor dlažby
        description: Vzor pokládky dlaždic — složitější vzory zvyšují odpad z řezání.

      # -- Krok 2 · Rozměry (měřeno z výkresu, editovatelné) -----------------
      deckGrossArea:
        type: number
        default: 0
        minimum: 0
        title: Hrubá plocha terasy
        description: Součet zakreslených ploch terasy — měřeno z výkresu, editovatelné.
        unit: m²
        x-measured:
          model: TerraceSurface
          derivation: area
          aggregate: sum
      obstaclesArea:
        type: number
        default: 0
        minimum: 0
        title: Plocha výřezů
        description: Bazény, truhlíky, sloupy — odečítají se od hrubé plochy.
        unit: m²
        x-measured:
          model: TerraceObstacle
          derivation: area
          aggregate: sum
      netDeckArea:
        type: number
        default: 0
        minimum: 0
        title: Čistá plocha terasy
        description: Hrubá plocha minus výřezy — odvozeno ze zakreslené geometrie.
        unit: m²
        x-measured:
          derivation: measuredNetArea
      deckPerimeter:
        type: number
        default: 0
        minimum: 0
        title: Obvod terasy
        description: Pro výpočet okrajových lišt — měřeno z výkresu.
        unit: m
        x-measured:
          model: TerraceSurface
          derivation: perimeter
          aggregate: sum

      # -- Krok 3 · Podkonstrukce --------------------------------------------
      substructureType:
        type: string
        default: alu
        format: entity-select
        x-options-resolver: resolveSubstructureType
        title: Typ podkladního nosníku
      joistSpacing:
        type: number
        default: 500
        enum: [400, 500, 600]
        title: Rozteč nosníků
        unit: mm
      installHeight:
        type: number
        default: 10
        minimum: 5
        title: Výška nad terénem
        unit: cm
      substructureBase:
        type: string
        default: concrete
        format: entity-select
        x-options-resolver: resolveSubstructureBase
        title: Typ podkladu

      # -- Krok 4 · Služby ---------------------------------------------------
      edgeTrim:
        type: boolean
        default: true
        title: Okrajové ukončovací lišty
      edgeTrimSides:
        type: string
        default: all
        format: entity-select
        x-options-resolver: resolveEdgeTrimSides
        title: Rozsah lišt
        description: Které strany obvodu se lemují — terasa u stěny domu lišty na té straně nepotřebuje.
      includeInstallation:
        type: boolean
        default: false
        title: Montáž na klíč

      # -- Krok 5 · Ceník (per-varianta; výchozí = standardní ceník) ----------
      # Ceny čtou kusovník i cenová nabídka přímo z varianty přes priceOf.
      # Metadata (sku/název/j.m./kategorie) drží computation priceMeta.
      priceWpcAntracit: { type: number, default: 857, minimum: 0, title: 'WPC prkno — antracit',  unit: 'Kč/m²' }
      priceWpcHneda:    { type: number, default: 857, minimum: 0, title: 'WPC prkno — hnědá',     unit: 'Kč/m²' }
      priceWpcSeda:     { type: number, default: 857, minimum: 0, title: 'WPC prkno — šedá',      unit: 'Kč/m²' }
      priceLarch:       { type: number, default: 649, minimum: 0, title: 'Sibiřský modřín',       unit: 'Kč/m²' }
      priceTile:        { type: number, default: 690, minimum: 0, title: 'Betonová dlažba 60×60', unit: 'Kč/m²' }
      priceSubAlu:      { type: number, default: 329, minimum: 0, title: 'Hliníkový nosník 4 m',  unit: 'Kč/ks' }
      priceSubWpc:      { type: number, default: 189, minimum: 0, title: 'WPC hranol 4 m',        unit: 'Kč/ks' }
      priceSubWood:     { type: number, default: 145, minimum: 0, title: 'Dřevěný hranol 4 m',    unit: 'Kč/ks' }
      pricePedestal:    { type: number, default: 42,  minimum: 0, title: 'Rektifikační terč',        unit: 'Kč/ks' }
      pricePedHigh:     { type: number, default: 85,  minimum: 0, title: 'Rektifikační terč vysoký',  unit: 'Kč/ks' }
      priceGeotex:      { type: number, default: 25,  minimum: 0, title: 'Geotextilie 300 g/m²',      unit: 'Kč/m²' }
      priceClip:        { type: number, default: 480, minimum: 0, title: 'Nerez spona WPC (bal. 100)',  unit: 'Kč/bal' }
      priceScrew:       { type: number, default: 320, minimum: 0, title: 'Nerez vrut dřevo (bal. 250)', unit: 'Kč/bal' }
      priceTrimWpc:     { type: number, default: 185, minimum: 0, title: 'WPC ukončovací lišta',  unit: 'Kč/bm' }
      priceTrimWood:    { type: number, default: 95,  minimum: 0, title: 'Modřínová krycí lišta',  unit: 'Kč/bm' }
      priceInstall:     { type: number, default: 450, minimum: 0, title: 'Montáž terasy',         unit: 'Kč/m²' }

      # -- Krok 6 · Parametry kalkulace (per-varianta) ------------------------
      # Odhadové konstanty spotřeby materiálu — čte je compute.constants(instance).
      # DPH zůstává natvrdo v compute.constants.
      pedestalPerM2Board: { type: number, default: 2.5,  minimum: 0,    title: 'Terče na m² (prkna)',   unit: 'ks/m²' }
      pedestalPerM2Tile:  { type: number, default: 3.0,  minimum: 0,    title: 'Terče na m² (dlažba)',  unit: 'ks/m²' }
      clipPerM2:          { type: number, default: 20,   minimum: 0,    title: 'Spony na m² (WPC)',     unit: 'ks/m²' }
      clipPerPack:        { type: number, default: 100,  minimum: 1,    title: 'Spon v balení',         unit: 'ks' }
      screwPerM2:         { type: number, default: 25,   minimum: 0,    title: 'Vruty na m² (dřevo)',   unit: 'ks/m²' }
      screwPerPack:       { type: number, default: 250,  minimum: 1,    title: 'Vrutů v balení',        unit: 'ks' }
      geotexOverlapPct:   { type: number, default: 5,    minimum: 0,    title: 'Přesah geotextilie',    unit: '%' }
      tileArea:           { type: number, default: 0.36, minimum: 0.01, title: 'Krycí plocha dlaždice', unit: 'm²' }
      stockLength:        { type: number, default: 4.0,  minimum: 0.5,  title: 'Délka nosníku/prkna',   unit: 'm' }

    # Kompozitní derivace inputModelu — čistá plocha = plochy minus výřezy.
    derivations:
      measuredNetArea:
        params: [instance, models, geo, geoAll, compute]
        body: |
          var surfaces = models.TerraceSurface || [];
          var obstacles = models.TerraceObstacle || [];
          var gross = 0;
          for (var i = 0; i < surfaces.length; i++) gross += (surfaces[i].area || 0);
          var holes = 0;
          for (var j = 0; j < obstacles.length; j++) holes += (obstacles[j].area || 0);
          return Math.max(0, gross - holes);
        unit: m²
        title: Čistá plocha (měřeno)

  # --- Zakreslená plocha terasy (rect/polygon, více geometrií) --------------
  TerraceSurface:
    x-entity: terrace_surfaces
    x-required-for-save: [project_id]
    title: Plocha terasy
    description: Zakreslená souvislá plocha terasy.
    properties:
      project_id: { type: [string, "null"] }
      name: { type: string, default: 'Terasa' }

      # -- Vzhled povrchu — nastavitelný přímo v nástroji (řídí kresbu na
      #    výkrese). Kalkulátor (TerraceConfig) má vlastní pole pro porovnání
      #    variant; tahle drží „zakreslenou pravdu" pro vizualizaci.
      material:
        type: string
        default: wpc
        format: entity-select
        x-options-resolver: resolveSurfMaterial
        title: Materiál povrchu
      layingDirection:
        type: string
        default: podel
        format: entity-select
        x-options-resolver: resolveSurfLayingDirection
        title: Směr pokládky
      boardWidth:
        type: number
        default: 140
        minimum: 50
        title: Šířka prkna
        unit: mm
      boardMaxLength:
        type: number
        default: 4000
        minimum: 1000
        title: Maximální délka prkna
        unit: mm
      boardGap:
        type: number
        default: 5
        minimum: 4
        maximum: 8
        title: Mezera mezi prkny
        unit: mm
      tilePattern:
        type: string
        default: rovny
        format: entity-select
        x-options-resolver: resolveSurfTilePattern
        title: Vzor dlažby

      regionGeometryIds:
        type: array
        items: { type: string, format: geometries }
        title: Geometrie plochy
        x-geometry-relation: { multiple: true }
        x-geometry-types: [rect, polygon]
    derivations:
      area:
        params: [instance, models, geo, geoAll, compute]
        body: |
          var total = 0;
          var ids = instance.regionGeometryIds || [];
          for (var i = 0; i < ids.length; i++) {
            total += compute.geometryArea(geo(ids[i]));
          }
          return total / (1000 * 1000);
        unit: m²
        title: Plocha
      perimeter:
        params: [instance, models, geo, geoAll, compute]
        body: |
          var total = 0;
          var ids = instance.regionGeometryIds || [];
          for (var i = 0; i < ids.length; i++) {
            total += compute.geometryPerimeter(geo(ids[i]));
          }
          return total / 1000;
        unit: m
        title: Obvod

  # --- Zakreslený výřez / překážka (rect/polygon, jedna geometrie) ----------
  TerraceObstacle:
    x-entity: terrace_obstacles
    x-required-for-save: [project_id]
    title: Výřez / překážka
    description: Zakreslená plocha odečtená z terasy (bazén, truhlík, sloup).
    properties:
      project_id: { type: [string, "null"] }
      name: { type: string, default: 'Výřez' }
      obstacleType:
        type: string
        default: pool
        format: entity-select
        x-options-resolver: resolveObstacleType
        title: Typ výřezu
      drivingGeometryId:
        type: string
        format: geometry
        title: Geometrie výřezu
        x-geometry-types: [rect, polygon, circle]
        x-geometry-relation: { multiple: false }
    derivations:
      area:
        params: [instance, models, geo, geoAll, compute]
        body: |
          var g = geo(instance.drivingGeometryId);
          if (!g) return 0;
          return compute.geometryArea(g) / (1000 * 1000);
        unit: m²
        title: Plocha výřezu

# =============================================================================
# Lifecycle — idempotentní seed ukázkových variant
# Ceník i parametry jsou nově součástí varianty (TerraceConfig) a jejich výchozí
# hodnoty drží schéma + fallbacky v compute.constants/priceOf, takže se neseedují.
# =============================================================================
lifecycle:
  initialized:
    body: |
      var pid = this.project.id;

      // --- Ukázkové varianty kalkulátoru (idempotentní dle existence) -----
      // Seedujeme JEN cenové/parametrické varianty (TerraceConfig) — ty na
      // geometrii nezávisí. Zakreslenou plochu (TerraceSurface) a výřezy
      // (TerraceObstacle) si uživatel kreslí sám příslušnými nástroji; kdyby
      // se seedovaly s natvrdo zadanými geometry ID, v novém projektu ta
      // geometrie neexistuje a vyskočilo by varování „bez geometrie“.
      var cfgRows = this.models.TerraceConfig.all.value;
      var hasCfg = false;
      for (var j = 0; j < cfgRows.length; j++) {
        if (cfgRows[j].project_id === pid) { hasCfg = true; break; }
      }
      if (!hasCfg) {
        this.models.TerraceConfig.save({
          project_id: pid, name: 'Varianta A — WPC antracit',
          material: 'wpc', boardColor: 'antracit', layingDirection: 'podel',
          boardGap: 5, tilePattern: 'rovny',
          substructureType: 'alu', joistSpacing: 500, installHeight: 10,
          substructureBase: 'concrete', edgeTrim: true, edgeTrimSides: 'three',
          includeInstallation: false
        });
      }

      // --- Druhá ukázková varianta: dlažba (idempotentní dle materiálu) ----
      var hasTile = false;
      for (var t = 0; t < cfgRows.length; t++) {
        if (cfgRows[t].project_id === pid && cfgRows[t].material === 'tile') { hasTile = true; break; }
      }
      if (!hasTile) {
        this.models.TerraceConfig.save({
          project_id: pid, name: 'Varianta B — betonová dlažba',
          material: 'tile', boardColor: 'antracit', layingDirection: 'podel',
          boardGap: 5, tilePattern: 'polovazba',
          substructureType: 'alu', joistSpacing: 500, installHeight: 10,
          substructureBase: 'concrete', edgeTrim: false, edgeTrimSides: 'all',
          includeInstallation: false
        });
      }

# =============================================================================
# Computations — sdílené pure helpery (běží v iframe sandboxu)
# =============================================================================
computations:

  # Resolver typů podkladu pro formulářový dropdown (format: entity-select).
  # Statická mapa x-options se v jsonforms nerenderuje — labely musí vracet
  # resolver. Hodnoty (concrete/soil/paving) drží výpočtová logika (=== 'soil').
  resolveSubstructureBase:
    params: [models, projectId, geo, geoAll, compute]
    body: |
      return [
        { value: 'concrete', label: 'Betonová deska' },
        { value: 'soil',     label: 'Zemina / štěrk' },
        { value: 'paving',   label: 'Stávající dlažba' }
      ];

  # --- Resolvery enum dropdownů (format: entity-select) --------------------
  # Statická mapa x-options se v jsonforms nerenderuje (ukáže holý klíč),
  # proto labely musí vracet resolver. Hodnoty enumu zůstávají stejné, ať
  # výpočtová logika (=== 'tile', === 'soil', …) funguje beze změny.
  # Kalkulátor (TerraceConfig) má popisnější labely (vč. odpadu), kreslicí
  # nástroje (TerraceSurface) kratší — proto samostatné resolvery.
  resolveCfgMaterial:
    params: [models, projectId, geo, geoAll, compute]
    body: |
      return [
        { value: 'wpc',   label: 'WPC kompozit — bezúdržbový' },
        { value: 'larch', label: 'Sibiřský modřín — přírodní dřevo' },
        { value: 'tile',  label: 'Betonová dlažba 60×60 — na terče' }
      ];

  resolveBoardColor:
    params: [models, projectId, geo, geoAll, compute]
    body: |
      return [
        { value: 'antracit', label: 'Antracit' },
        { value: 'hneda',    label: 'Hnědá / teak' },
        { value: 'seda',     label: 'Šedá' }
      ];

  resolveCfgLayingDirection:
    params: [models, projectId, geo, geoAll, compute]
    body: |
      return [
        { value: 'podel',    label: 'Podél (odpad ~5 %)' },
        { value: 'napric',   label: 'Napříč (odpad ~7 %)' },
        { value: 'diagonal', label: 'Diagonálně 45° (odpad ~15 %)' }
      ];

  resolveCfgTilePattern:
    params: [models, projectId, geo, geoAll, compute]
    body: |
      return [
        { value: 'rovny',     label: 'Rovná vazba (odpad ~5 %)' },
        { value: 'polovazba', label: 'Poloviční vazba (odpad ~8 %)' },
        { value: 'rybikost',  label: 'Rybí kost (odpad ~15 %)' },
        { value: 'diag45',    label: 'Diagonálně 45° (odpad ~15 %)' }
      ];

  resolveSubstructureType:
    params: [models, projectId, geo, geoAll, compute]
    body: |
      return [
        { value: 'alu',  label: 'Hliníkový nosník' },
        { value: 'wpc',  label: 'WPC hranol' },
        { value: 'wood', label: 'Dřevěný hranol modřín' }
      ];

  resolveEdgeTrimSides:
    params: [models, projectId, geo, geoAll, compute]
    body: |
      return [
        { value: 'all',   label: 'Celý obvod' },
        { value: 'three', label: '3 strany (1 u stěny)' },
        { value: 'two',   label: '2 strany (v koutě)' },
        { value: 'one',   label: '1 strana (volná hrana)' }
      ];

  resolveSurfMaterial:
    params: [models, projectId, geo, geoAll, compute]
    body: |
      return [
        { value: 'wpc',   label: 'WPC kompozit' },
        { value: 'larch', label: 'Sibiřský modřín' },
        { value: 'tile',  label: 'Betonová dlažba 60×60' }
      ];

  resolveSurfLayingDirection:
    params: [models, projectId, geo, geoAll, compute]
    body: |
      return [
        { value: 'podel',    label: 'Podél' },
        { value: 'napric',   label: 'Napříč' },
        { value: 'diagonal', label: 'Diagonálně 45°' }
      ];

  resolveSurfTilePattern:
    params: [models, projectId, geo, geoAll, compute]
    body: |
      return [
        { value: 'rovny',     label: 'Rovná vazba' },
        { value: 'polovazba', label: 'Poloviční vazba' },
        { value: 'rybikost',  label: 'Rybí kost' },
        { value: 'diag45',    label: 'Diagonálně 45°' }
      ];

  resolveObstacleType:
    params: [models, projectId, geo, geoAll, compute]
    body: |
      return [
        { value: 'pool',    label: 'Bazén / jezírko' },
        { value: 'planter', label: 'Truhlík / záhon' },
        { value: 'column',  label: 'Sloup / pilíř' },
        { value: 'other',   label: 'Jiný' }
      ];

  # Plocha geometrie v px² (mm²). rect → w·h; polygon → shoelace.
  geometryArea:
    params: [geo]
    body: |
      if (!geo) return 0;
      if (geo.type === 'rect') return geo.width * geo.height;
      if (geo.type === 'circle') return Math.PI * geo.radius * geo.radius;
      if (geo.type === 'polygon' && geo.points && geo.points.length >= 3) {
        var a = 0;
        for (var i = 0; i < geo.points.length; i++) {
          var j = (i + 1) % geo.points.length;
          a += geo.points[i].x * geo.points[j].y - geo.points[j].x * geo.points[i].y;
        }
        return Math.abs(a) / 2;
      }
      return 0;

  # Obvod geometrie v px (mm). rect → 2·(w+h); polygon → součet hran.
  geometryPerimeter:
    params: [geo]
    body: |
      if (!geo) return 0;
      if (geo.type === 'rect') return 2 * (geo.width + geo.height);
      if (geo.type === 'circle') return 2 * Math.PI * geo.radius;
      if (geo.type === 'polygon' && geo.points && geo.points.length >= 2) {
        var p = 0;
        var pts = geo.points;
        for (var i = 0; i < pts.length; i++) {
          var j = (i + 1) % pts.length;
          var dx = pts[j].x - pts[i].x;
          var dy = pts[j].y - pts[i].y;
          p += Math.sqrt(dx * dx + dy * dy);
        }
        return p;
      }
      return 0;

  # Konstanty výkazu výměr — odhadové koeficienty spotřeby materiálu. Čte je
  # přímo z varianty (TerraceConfig), kde jsou parametry editovatelné v kroku
  # „Parametry"; chybějící hodnota → výchozí. DPH (vatRate) zůstává natvrdo.
  # Volá se compute.constants(instance).
  constants:
    params: [instance]
    body: |
      var p = instance || {};
      function pos(v, d) { return (v != null && v > 0) ? v : d; }       // pro dělitele (musí být > 0)
      function nn(v, d) { return (v != null && v >= 0) ? v : d; }       // pro nezáporné spotřeby
      return {
        vatRate: 0.21,                                  // sazba DPH (natvrdo)
        tileArea: pos(p.tileArea, 0.36),                // m², krycí plocha dlaždice
        stockLength: pos(p.stockLength, 4.0),           // m, standardní délka nosníku/prkna
        pedestalPerM2Tile: nn(p.pedestalPerM2Tile, 3.0),// terče/m² pod dlažbu
        pedestalPerM2Board: nn(p.pedestalPerM2Board, 2.5),// terče/m² pod prkna
        clipPerM2: nn(p.clipPerM2, 20),                 // nerez spony/m² (WPC)
        clipPerPack: pos(p.clipPerPack, 100),           // spon v balení
        screwPerM2: nn(p.screwPerM2, 25),               // nerez vruty/m² (dřevo)
        screwPerPack: pos(p.screwPerPack, 250),         // vrutů v balení
        geotexOverlap: 1 + nn(p.geotexOverlapPct, 5) / 100 // přesah geotextilie (z %)
      };

  # Nářez prken — rozpis přes krycí běžné metry (robustní pro libovolný tvar
  # i více ploch; nezávislé na rekonstrukci obdélníku z plochy a obvodu).
  # Krycí běžné metry = plocha ÷ krycí šířka prkna. Prken k nákupu = bm ÷ délka
  # prkna se započtením řezné/manipulační rezervy podle směru pokládky (počítá
  # se s druhováním odřezků). Délka prkna mění POČET kusů, ne množství materiálu
  # (m² nakoupeného materiálu ≈ plocha × (1 + rezerva), nezávisle na délce).
  boardLayout:
    params: [netArea, boardWidth, boardLength, direction, boardGap]
    body: |
      var bw = boardWidth > 0 ? boardWidth : 140;
      var bl = boardLength > 0 ? boardLength : 4000;
      var gap = boardGap > 0 ? boardGap : 5;    // mm, dilatační mezera mezi prkny
      var coverWidth = (bw + gap) / 1000;       // m, krycí rozteč vč. mezery (kolik plochy prkno pokryje)
      var boardWidthM = bw / 1000;              // m, skutečná šířka prkna (nakoupený materiál)
      var boardLenM = bl / 1000;                // m, délka prkna
      var net = netArea > 0 ? netArea : 0;
      var allowancePct = direction === 'diagonal' ? 0.15
                       : (direction === 'napric' ? 0.07 : 0.05);
      if (net <= 0 || coverWidth <= 0 || boardLenM <= 0) {
        return {
          linearM: 0, totalBoards: 0, purchasedM: 0, coverArea: 0,
          offcutM: 0, wastePct: 0, allowancePct: allowancePct
        };
      }
      var linearM = net / coverWidth;                         // krycí běžné metry prken (mezera pomáhá krýt plochu)
      var totalBoards = Math.ceil((linearM * (1 + allowancePct)) / boardLenM);
      var purchasedM = totalBoards * boardLenM;
      var coverArea = totalBoards * boardWidthM * boardLenM;  // m² nakoupeného materiálu (skutečná šířka prkna)
      var offcutM = Math.max(0, purchasedM - linearM);
      var wastePct = linearM > 0 ? offcutM / linearM : 0;
      return {
        linearM: linearM, totalBoards: totalBoards, purchasedM: purchasedM,
        coverArea: coverArea, offcutM: offcutM, wastePct: wastePct,
        allowancePct: allowancePct
      };

  # Koeficient odpadu dlažby dle vzoru pokládky.
  tileWasteFactor:
    params: [pattern]
    body: |
      if (pattern === 'rybikost' || pattern === 'diag45') return 1.15;
      if (pattern === 'polovazba') return 1.08;
      return 1.05;

  # Podíl obvodu, který se lemuje ukončovací lištou — terasa u stěny domu
  # lišty na přilehlých stranách nepotřebuje. Vrací 0–1.
  edgeTrimFraction:
    params: [edgeTrim, edgeTrimSides]
    body: |
      if (!edgeTrim) return 0;
      if (edgeTrimSides === 'three') return 0.75;
      if (edgeTrimSides === 'two') return 0.5;
      if (edgeTrimSides === 'one') return 0.25;
      return 1;

  # Metadata ceníku — mapování cenového pole varianty (priceXxx) → sku/název/
  # j.m./kategorie. Jediný zdroj pravdy pro názvy položek v kusovníku i nabídce.
  priceMeta:
    params: []
    body: |
      return [
        { field: 'priceWpcAntracit', sku: 'DECK-WPC-ANTRACIT', category: 'Povrch', name: 'WPC terasové prkno 140×25 mm — antracit', unit: 'm²', def: 857 },
        { field: 'priceWpcHneda',    sku: 'DECK-WPC-HNEDA',    category: 'Povrch', name: 'WPC terasové prkno 140×25 mm — hnědá',    unit: 'm²', def: 857 },
        { field: 'priceWpcSeda',     sku: 'DECK-WPC-SEDA',     category: 'Povrch', name: 'WPC terasové prkno 140×25 mm — šedá',     unit: 'm²', def: 857 },
        { field: 'priceLarch',       sku: 'DECK-LARCH',        category: 'Povrch', name: 'Sibiřský modřín terasové prkno 140×27 mm', unit: 'm²', def: 649 },
        { field: 'priceTile',        sku: 'DECK-TILE-GREY',    category: 'Povrch', name: 'Betonová terasová dlažba 60×60 cm — šedá', unit: 'm²', def: 690 },
        { field: 'priceSubAlu',      sku: 'SUB-ALU-4M',  category: 'Podkonstrukce', name: 'Hliníkový nosník 40×60×4000 mm', unit: 'ks', def: 329 },
        { field: 'priceSubWpc',      sku: 'SUB-WPC-4M',  category: 'Podkonstrukce', name: 'WPC podkladní hranol 40×60×4000 mm', unit: 'ks', def: 189 },
        { field: 'priceSubWood',     sku: 'SUB-WOOD-4M', category: 'Podkonstrukce', name: 'Dřevěný hranol modřín 45×70×4000 mm', unit: 'ks', def: 145 },
        { field: 'pricePedestal',    sku: 'PED-ADJ',     category: 'Podkonstrukce', name: 'Rektifikační terč nastavitelný 40–60 mm', unit: 'ks', def: 42 },
        { field: 'pricePedHigh',     sku: 'PED-HIGH',    category: 'Podkonstrukce', name: 'Rektifikační terč vysoký 60–150 mm', unit: 'ks', def: 85 },
        { field: 'priceGeotex',      sku: 'GEOTEX',      category: 'Podkonstrukce', name: 'Geotextilie 300 g/m² (proti plevelu)', unit: 'm²', def: 25 },
        { field: 'priceClip',        sku: 'FAST-CLIP-100',  category: 'Spojovací materiál', name: 'Nerez montážní spona pro WPC (bal. 100 ks)', unit: 'bal', def: 480 },
        { field: 'priceScrew',       sku: 'FAST-SCREW-250', category: 'Spojovací materiál', name: 'Nerez terasový vrut pro dřevo (bal. 250 ks)', unit: 'bal', def: 320 },
        { field: 'priceTrimWpc',     sku: 'TRIM-WPC',  category: 'Lišty', name: 'WPC ukončovací L-lišta', unit: 'bm', def: 185 },
        { field: 'priceTrimWood',    sku: 'TRIM-WOOD', category: 'Lišty', name: 'Modřínová krycí lišta', unit: 'bm', def: 95 },
        { field: 'priceInstall',     sku: 'SRV-INSTALL', category: 'Služby', name: 'Montáž terasy vč. podkonstrukce', unit: 'm²', def: 450 }
      ];

  # Vyhledání ceny — odolné (chybějící SKU nehodí výjimku).
  # prices = varianta TerraceConfig (drží pole priceXxx); meta = výstup priceMeta().
  priceOf:
    params: [meta, prices, sku]
    body: |
      for (var i = 0; i < meta.length; i++) {
        if (meta[i].sku === sku) {
          var m = meta[i];
          var v = (prices && prices[m.field] != null) ? prices[m.field] : m.def;
          return { sku: sku, name: m.name, unit: m.unit, unitPrice: v };
        }
      }
      return { sku: sku, name: sku, unit: 'ks', unitPrice: 0 };

  # SKU povrchové desky dle materiálu a barvy.
  deckBoardSku:
    params: [material, boardColor]
    body: |
      if (material === 'tile') return 'DECK-TILE-GREY';
      if (material === 'larch') return 'DECK-LARCH';
      if (boardColor === 'hneda') return 'DECK-WPC-HNEDA';
      if (boardColor === 'seda') return 'DECK-WPC-SEDA';
      return 'DECK-WPC-ANTRACIT';

  # SKU podkladního nosníku dle typu.
  joistSku:
    params: [substructureType]
    body: |
      if (substructureType === 'wpc') return 'SUB-WPC-4M';
      if (substructureType === 'wood') return 'SUB-WOOD-4M';
      return 'SUB-ALU-4M';

  # SKU rektifikačního terče dle výšky nad terénem (cm). Běžný terč zvládá
  # ~4–6 cm; nad 6 cm je potřeba vyšší (dražší) typ.
  pedestalSku:
    params: [installHeight]
    body: |
      var h = installHeight || 0;
      return h > 6 ? 'PED-HIGH' : 'PED-ADJ';

  # Vizualizace povrchu — čáry prken / mřížka dlažby pro vykreslení do plochy.
  # Materiál a směr pokládky se čtou z první varianty projektu. Čáry se generují
  # přes obálku plochy a v šabloně se ořežou clipPath na skutečný tvar.
  surfaceLines:
    params: [geo, models, surface]
    body: |
      var ids = (surface && surface.regionGeometryIds) || [];
      var minX = null, minY = null, maxX = null, maxY = null;
      function ext(x, y) {
        if (minX === null || x < minX) minX = x;
        if (maxX === null || x > maxX) maxX = x;
        if (minY === null || y < minY) minY = y;
        if (maxY === null || y > maxY) maxY = y;
      }
      // Plocha v px² (mm²) — rect → w·h, polygon → shoelace. Derivace m.area
      // se v šabloně nástroje nevyhodnocuje, proto se plocha pro popisek
      // počítá zde a vrací jako areaM2.
      function geomArea(g) {
        if (g.type === 'rect') return g.width * g.height;
        if (g.type === 'polygon' && g.points && g.points.length >= 3) {
          var a = 0;
          for (var k = 0; k < g.points.length; k++) {
            var n = (k + 1) % g.points.length;
            a += g.points[k].x * g.points[n].y - g.points[n].x * g.points[k].y;
          }
          return Math.abs(a) / 2;
        }
        return 0;
      }
      var areaPx = 0;
      for (var i = 0; i < ids.length; i++) {
        var g = geo(ids[i]);
        if (!g) continue;
        areaPx += geomArea(g);
        if (g.type === 'rect') { ext(g.x, g.y); ext(g.x + g.width, g.y + g.height); }
        else if (g.type === 'polygon' && g.points) {
          for (var p = 0; p < g.points.length; p++) ext(g.points[p].x, g.points[p].y);
        }
      }
      var pid = surface ? surface.project_id : null;
      var cfgs = (models.TerraceConfig || []).filter(function (c) { return c.project_id === pid; });
      var c = cfgs[0] || null;
      // Vzhled se čte primárně ze zakreslené plochy (nastaveno v nástroji);
      // fallback na první variantu kalkulátoru a nakonec na výchozí hodnoty.
      var material = (surface && surface.material) || (c ? c.material : null) || 'wpc';
      var dir = (surface && surface.layingDirection) || (c ? c.layingDirection : null) || 'podel';
      var isTile = (material === 'tile');
      var out = {
        fill:   isTile ? 'rgba(150,160,166,0.18)' : 'rgba(184,118,62,0.20)',
        stroke: isTile ? '#6b7280' : '#8a5a2b',
        color:  isTile ? '#6b7280' : '#8a5a2b',
        sw:     isTile ? 1.2 : 1,
        areaM2: areaPx / (1000 * 1000),
        lines:  [],
        holes:  [],
        joists: [],
        pedestals: [],
        joistColor: '#8b939c',
        joistW: 36
      };
      // Výřezy (bazén apod.) — odečtou se z masky, aby přes ně vzor nešel.
      var obs = (models.TerraceObstacle || []).filter(function (o) { return o.project_id === pid; });
      for (var oi = 0; oi < obs.length; oi++) {
        var og = geo(obs[oi].drivingGeometryId);
        if (!og) continue;
        if (og.type === 'rect') out.holes.push({ kind: 'rect', x: og.x, y: og.y, w: og.width, h: og.height });
        else if (og.type === 'circle') out.holes.push({ kind: 'circle', cx: og.x, cy: og.y, r: og.radius });
        else if (og.type === 'polygon' && og.svgPoints) out.holes.push({ kind: 'poly', pts: og.svgPoints });
      }
      if (minX === null) return out;
      var w = maxX - minX, h = maxY - minY;
      var bw = (surface && surface.boardWidth) || (c ? c.boardWidth : 0) || 140;
      var gap = (surface && surface.boardGap) || (c ? c.boardGap : 0) || 5;
      var tilePattern = (surface && surface.tilePattern) || (c ? c.tilePattern : null) || 'rovny';
      var pitch = isTile ? 600 : (bw + gap);     // dlaždice 60 cm; prkno bw + dilatační mezera
      var bl = (surface && surface.boardMaxLength) || (c ? c.boardMaxLength : 0) || 4000;   // max. délka prkna (mm = px)

      // --- Podkonstrukce pod povrchem (nosníky + rektifikační terče) --------
      // Nosníky běží KOLMO na prkna v rozteči joistSpacing a nesou je terče
      // v pravidelné mřížce. U dlažby je nosný rošt nahrazen mřížkou terčů
      // (dlaždice leží přímo na terčích). Generuje se přes obálku plochy,
      // v šabloně se to ořezává stejnou maskou jako vzor povrchu.
      var subType = (c ? c.substructureType : null) || 'alu';
      var js = (c ? c.joistSpacing : 0) || 500;                 // rozteč nosníků (mm)
      out.joistColor = subType === 'wood' ? '#7a5230'
                     : (subType === 'wpc' ? '#5f6b5a' : '#8b939c');
      out.joistW = Math.max(30, Math.min(60, js / 14));         // pohledová šířka nosníku (mm)
      var pedPitch = 900;                                       // rozteč terčů podél nosníku (mm)
      var scap = 600;                                           // strop počtu prvků
      if (isTile) {
        for (var ty = minY + pitch / 2; ty < maxY && out.pedestals.length < scap; ty += pitch) {
          for (var tx = minX + pitch / 2; tx < maxX && out.pedestals.length < scap; tx += pitch) {
            out.pedestals.push({ cx: tx, cy: ty });
          }
        }
      } else if (dir !== 'napric') {        // prkna podél / diagonálně → nosníky svislé
        for (var jx = minX + js / 2; jx < maxX && out.joists.length < scap; jx += js) {
          out.joists.push({ x1: jx, y1: minY, x2: jx, y2: maxY });
        }
        for (var py = minY + pedPitch / 2; py < maxY && out.pedestals.length < scap; py += pedPitch) {
          for (var jx2 = minX + js / 2; jx2 < maxX && out.pedestals.length < scap; jx2 += js) {
            out.pedestals.push({ cx: jx2, cy: py });
          }
        }
      } else {                              // prkna napříč → nosníky vodorovné
        for (var jy = minY + js / 2; jy < maxY && out.joists.length < scap; jy += js) {
          out.joists.push({ x1: minX, y1: jy, x2: maxX, y2: jy });
        }
        for (var px = minX + pedPitch / 2; px < maxX && out.pedestals.length < scap; px += pedPitch) {
          for (var jy2 = minY + js / 2; jy2 < maxY && out.pedestals.length < scap; jy2 += js) {
            out.pedestals.push({ cx: px, cy: jy2 });
          }
        }
      }

      var lines = out.lines;
      var cap = 1000;
      function vlines() { for (var x = minX + pitch; x < maxX - 1 && lines.length < cap; x += pitch) lines.push({ x1: x, y1: minY, x2: x, y2: maxY }); }
      function hlines() { for (var y = minY + pitch; y < maxY - 1 && lines.length < cap; y += pitch) lines.push({ x1: minX, y1: y, x2: maxX, y2: y }); }
      // Příčné spáry prken (nářez po max. délce), prostřídané o půlku prkna (cihlová vazba).
      // Podél: prkna běží podél X → spáry svislé v každém pásu řady.
      function podelJoints() {
        var r = 0;
        for (var y = minY; y < maxY - 1 && lines.length < cap; y += pitch) {
          var yb = (y + pitch < maxY) ? y + pitch : maxY;
          var off = (r % 2) * (bl / 2);
          for (var jx = minX + bl - off; jx < maxX - 1 && lines.length < cap; jx += bl) {
            if (jx > minX) lines.push({ x1: jx, y1: y, x2: jx, y2: yb });
          }
          r++;
        }
      }
      // Napříč: prkna běží podél Y → spáry vodorovné v každém sloupci.
      function napricJoints() {
        var col = 0;
        for (var x = minX; x < maxX - 1 && lines.length < cap; x += pitch) {
          var xb = (x + pitch < maxX) ? x + pitch : maxX;
          var off = (col % 2) * (bl / 2);
          for (var jy = minY + bl - off; jy < maxY - 1 && lines.length < cap; jy += bl) {
            if (jy > minY) lines.push({ x1: x, y1: jy, x2: xb, y2: jy });
          }
          col++;
        }
      }
      // Dlažba — poloviční vazba: vodorovné spáry + svislé prostřídané o půl dlaždice.
      function tileRunningBond() {
        hlines();
        var r = 0;
        for (var y = minY; y < maxY - 1 && lines.length < cap; y += pitch) {
          var yb = (y + pitch < maxY) ? y + pitch : maxY;
          var off = (r % 2) * (pitch / 2);
          for (var jx = minX + pitch - off; jx < maxX - 1 && lines.length < cap; jx += pitch) {
            if (jx > minX) lines.push({ x1: jx, y1: y, x2: jx, y2: yb });
          }
          r++;
        }
      }
      // Dlažba — diagonální 45° mřížka (dva směry úhlopříček).
      function tileDiagGrid() {
        var span = w + h;
        for (var sx = minX - h; sx < maxX && lines.length < cap; sx += pitch) {
          lines.push({ x1: sx, y1: minY, x2: sx + span, y2: minY + span });
        }
        for (var sx2 = minX; sx2 < maxX + h && lines.length < cap; sx2 += pitch) {
          lines.push({ x1: sx2, y1: minY, x2: sx2 - span, y2: minY + span });
        }
      }
      // Dlažba — rybí kost: krátké 45° úsečky střídající směr v mřížce.
      function tileHerringbone() {
        for (var gy = minY; gy < maxY && lines.length < cap; gy += pitch) {
          for (var gx = minX; gx < maxX && lines.length < cap; gx += pitch) {
            var even = ((Math.round((gx - minX) / pitch) + Math.round((gy - minY) / pitch)) % 2) === 0;
            if (even) lines.push({ x1: gx, y1: gy, x2: gx + pitch, y2: gy + pitch });
            else lines.push({ x1: gx + pitch, y1: gy, x2: gx, y2: gy + pitch });
          }
        }
      }
      if (isTile) {
        if (tilePattern === 'diag45') tileDiagGrid();
        else if (tilePattern === 'rybikost') tileHerringbone();
        else if (tilePattern === 'polovazba') tileRunningBond();
        else { vlines(); hlines(); }
      }
      else if (dir === 'napric') { vlines(); napricJoints(); }
      else if (dir === 'diagonal') {
        var span = w + h;
        for (var sx = minX - h; sx < maxX && lines.length < cap; sx += pitch) {
          lines.push({ x1: sx, y1: minY, x2: sx + span, y2: minY + span });
        }
      } else { hlines(); podelJoints(); }
      return out;

  # Umístění popisku — vrátí dobrý VNITŘNÍ bod pro text (pól nedostupnosti)
  # a „poloměr" volného místa kolem něj (room), pro PLOŠNĚ NEJVĚTŠÍ z
  # předaných geometrií. Bbox střed (envelope) padá u L-tvarů a konkávních
  # polygonů MIMO plochu — proto se hledá bod nejdál od všech hran, který
  # leží uvnitř. room slouží i k proporčnímu nastavení velikosti písma.
  labelSpot:
    params: [geos]
    body: |
      function pip(x, y, pts) {
        var inside = false;
        for (var i = 0, j = pts.length - 1; i < pts.length; j = i++) {
          var xi = pts[i].x, yi = pts[i].y, xj = pts[j].x, yj = pts[j].y;
          if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
        }
        return inside;
      }
      function dSeg(px, py, ax, ay, bx, by) {
        var dx = bx - ax, dy = by - ay, l2 = dx * dx + dy * dy;
        var t = l2 ? ((px - ax) * dx + (py - ay) * dy) / l2 : 0;
        t = t < 0 ? 0 : (t > 1 ? 1 : t);
        var cx = ax + t * dx, cy = ay + t * dy;
        return Math.sqrt((px - cx) * (px - cx) + (py - cy) * (py - cy));
      }
      function dPoly(x, y, pts) {
        var d = Infinity;
        for (var i = 0, j = pts.length - 1; i < pts.length; j = i++) d = Math.min(d, dSeg(x, y, pts[j].x, pts[j].y, pts[i].x, pts[i].y));
        return d;
      }
      function spotOf(g) {
        if (!g) return null;
        if (g.type === 'circle') return { x: g.x, y: g.y, room: g.radius, area: Math.PI * g.radius * g.radius };
        if (g.type === 'rect') return { x: g.x + g.width / 2, y: g.y + g.height / 2, room: Math.min(g.width, g.height) / 2, area: g.width * g.height };
        if (g.type === 'polygon' && g.points && g.points.length >= 3) {
          var pts = g.points, minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
          for (var p = 0; p < pts.length; p++) {
            if (pts[p].x < minX) minX = pts[p].x; if (pts[p].x > maxX) maxX = pts[p].x;
            if (pts[p].y < minY) minY = pts[p].y; if (pts[p].y > maxY) maxY = pts[p].y;
          }
          var w = maxX - minX, h = maxY - minY;
          // Shoelace plocha pro výběr největší geometrie.
          var a2 = 0;
          for (var k = 0; k < pts.length; k++) { var n = (k + 1) % pts.length; a2 += pts[k].x * pts[n].y - pts[n].x * pts[k].y; }
          var area = Math.abs(a2) / 2;
          // Pól nedostupnosti — mřížkové hledání vnitřního bodu nejdál od hran.
          var N = 20, sx = w / N, sy = h / N;
          var bx = (minX + maxX) / 2, by = (minY + maxY) / 2, bd = -1;
          for (var gx = minX + sx / 2; gx < maxX; gx += sx) {
            for (var gy = minY + sy / 2; gy < maxY; gy += sy) {
              if (!pip(gx, gy, pts)) continue;
              var d = dPoly(gx, gy, pts);
              if (d > bd) { bd = d; bx = gx; by = gy; }
            }
          }
          if (bd < 0) {
            // velmi tenký polygon → centroid jako nouzové řešení
            var cx = 0, cy = 0;
            for (var q = 0; q < pts.length; q++) { cx += pts[q].x; cy += pts[q].y; }
            return { x: cx / pts.length, y: cy / pts.length, room: Math.min(w, h) / 2, area: area };
          }
          return { x: bx, y: by, room: bd, area: area };
        }
        return null;
      }
      var best = null;
      var list = geos || [];
      for (var i = 0; i < list.length; i++) {
        var s = spotOf(list[i]);
        if (s && (!best || s.area > best.area)) best = s;
      }
      return best;

  # Měřené plochy z modelů (rollup ze zakreslené geometrie) — fallback,
  # když x-measured pole ve formuláři ještě nejsou naseedovaná.
  measuredNet:
    params: [models, instance]
    body: |
      var pid = instance ? instance.project_id : null;
      var surfaces = (models.TerraceSurface || []).filter(function (s) { return s.project_id === pid; });
      var obstacles = (models.TerraceObstacle || []).filter(function (o) { return o.project_id === pid; });
      var gross = 0;
      for (var i = 0; i < surfaces.length; i++) gross += (surfaces[i].area || 0);
      var holes = 0;
      for (var j = 0; j < obstacles.length; j++) holes += (obstacles[j].area || 0);
      var perim = 0;
      for (var k = 0; k < surfaces.length; k++) perim += (surfaces[k].perimeter || 0);
      return { gross: gross, holes: holes, perim: perim, net: Math.max(0, gross - holes) };

# =============================================================================
# Tools — kreslicí nástroje
# =============================================================================
tools:

  terrace-surface:
    model: TerraceSurface
    icon: o_deck
    label: Plocha terasy
    namePrefix: Terasa
    dialogFields: [name, material, layingDirection, boardWidth, boardMaxLength, boardGap, tilePattern, regionGeometryIds]
    template: |
      {% if geos | length > 0 %}
      {% set viz = compute.surfaceLines(geo, models, m) %}
      {% set maskId = 'surf-mask-' + m.id %}
      <g class="terrace-surface{{ ' temporary' if isTemporary else '' }}"
         {{ 'opacity="0.6"' if isTemporary else '' }}>
        <defs>
          <mask id="{{ maskId }}" maskContentUnits="userSpaceOnUse">
            {# plocha = viditelný vzor (bílá) #}
            {% for gg in geos %}
            {% if gg.type == 'rect' %}
            <rect x="{{ gg.x }}" y="{{ gg.y }}" width="{{ gg.width }}" height="{{ gg.height }}" fill="#ffffff" />
            {% elif gg.type == 'polygon' and gg.svgPoints %}
            <polygon points="{{ gg.svgPoints }}" fill="#ffffff" />
            {% endif %}
            {% endfor %}
            {# výřezy = skrytý vzor (černá) #}
            {% for ho in viz.holes %}
            {% if ho.kind == 'rect' %}
            <rect x="{{ ho.x }}" y="{{ ho.y }}" width="{{ ho.w }}" height="{{ ho.h }}" fill="#000000" />
            {% elif ho.kind == 'circle' %}
            <circle cx="{{ ho.cx }}" cy="{{ ho.cy }}" r="{{ ho.r }}" fill="#000000" />
            {% elif ho.kind == 'poly' %}
            <polygon points="{{ ho.pts }}" fill="#000000" />
            {% endif %}
            {% endfor %}
          </mask>
        </defs>

        {% for gg in geos %}
        {% if gg.type == 'rect' %}
        <rect x="{{ gg.x }}" y="{{ gg.y }}" width="{{ gg.width }}" height="{{ gg.height }}"
              fill="{{ viz.fill }}" stroke="{{ viz.stroke }}" stroke-width="2"
              vector-effect="non-scaling-stroke" />
        {% elif gg.type == 'polygon' and gg.svgPoints %}
        <polygon points="{{ gg.svgPoints }}"
                 fill="{{ viz.fill }}" stroke="{{ viz.stroke }}" stroke-width="2"
                 vector-effect="non-scaling-stroke" />
        {% endif %}
        {% endfor %}

        {# Podkonstrukce — nosníky a terče „prosvítají" pod povrchem #}
        <g mask="url(#{{ maskId }})" opacity="0.4">
          {% for j in viz.joists %}
          <line x1="{{ j.x1 }}" y1="{{ j.y1 }}" x2="{{ j.x2 }}" y2="{{ j.y2 }}"
                stroke="{{ viz.joistColor }}" stroke-width="{{ viz.joistW }}"
                stroke-linecap="butt" />
          {% endfor %}
          {% for p in viz.pedestals %}
          <circle cx="{{ p.cx }}" cy="{{ p.cy }}" r="{{ viz.joistW }}"
                  fill="{{ viz.joistColor }}" />
          {% endfor %}
        </g>

        <g mask="url(#{{ maskId }})">
          {% for ln in viz.lines %}
          <line x1="{{ ln.x1 }}" y1="{{ ln.y1 }}" x2="{{ ln.x2 }}" y2="{{ ln.y2 }}"
                stroke="{{ viz.color }}" stroke-width="{{ viz.sw }}"
                vector-effect="non-scaling-stroke" opacity="0.55" />
          {% endfor %}
        </g>

        {% set spot = compute.labelSpot(geos) %}
        {% if spot %}
        {# Popisek se umisťuje do vnitřního „vizuálního středu" plochy (ne do
           středu obálky, který u L-tvarů padá mimo) a velikost se odvozuje
           od volného místa (room) tak, aby se text vešel a byl čitelný na
           přirozeném zoomu. Spodní mez = pointsToMm(11) pro malé/kalibrované
           výkresy. #}
        {% set label = m.name ~ ' · ' ~ (viz.areaM2 | round(1)) ~ ' m²' %}
        {% set fitW = spot.room * 1.7 / (0.58 * (label | length)) %}
        {% set fitH = spot.room * 0.7 %}
        {% set fs = fitW if fitW < fitH else fitH %}
        {% set floor = pointsToMm(11) %}
        {% set fs = fs if fs > floor else floor %}
        <text x="{{ spot.x }}" y="{{ spot.y }}"
              text-anchor="middle" dominant-baseline="central"
              font-family="-apple-system, BlinkMacSystemFont, sans-serif"
              font-size="{{ fs }}" fill="#6b3f17" font-weight="700"
              paint-order="stroke" stroke="#ffffff" stroke-width="{{ fs * 0.14 }}"
              style="user-select: none">{{ label }}</text>
        {% endif %}
      </g>
      {% endif %}

  terrace-obstacle:
    model: TerraceObstacle
    icon: o_block
    label: Výřez / překážka
    namePrefix: Výřez
    dialogFields: [name, obstacleType, drivingGeometryId]
    defaultValues:
      obstacleType: pool
    template: |
      {% if g %}
      <g class="terrace-obstacle{{ ' temporary' if isTemporary else '' }}"
         {{ 'opacity="0.6"' if isTemporary else '' }}>
        {% if g.type == 'rect' %}
        <rect x="{{ g.x }}" y="{{ g.y }}" width="{{ g.width }}" height="{{ g.height }}"
              fill="rgba(71, 85, 105, 0.30)" stroke="#475569" stroke-width="2"
              stroke-dasharray="6 3" vector-effect="non-scaling-stroke" />
        {% elif g.type == 'circle' %}
        <circle cx="{{ g.x }}" cy="{{ g.y }}" r="{{ g.radius }}"
                fill="rgba(71, 85, 105, 0.30)" stroke="#475569" stroke-width="2"
                stroke-dasharray="6 3" vector-effect="non-scaling-stroke" />
        {% elif g.type == 'polygon' and g.svgPoints %}
        <polygon points="{{ g.svgPoints }}"
                 fill="rgba(71, 85, 105, 0.30)" stroke="#475569" stroke-width="2"
                 stroke-dasharray="6 3" vector-effect="non-scaling-stroke" />
        {% endif %}
        {% set spot = compute.labelSpot([g]) %}
        {% if spot %}
        {% set ofitW = spot.room * 1.7 / (0.58 * (m.name | length)) %}
        {% set ofitH = spot.room * 0.7 %}
        {% set ofs = ofitW if ofitW < ofitH else ofitH %}
        {% set ofloor = pointsToMm(9) %}
        {% set ofs = ofs if ofs > ofloor else ofloor %}
        <text x="{{ spot.x }}" y="{{ spot.y }}"
              text-anchor="middle" dominant-baseline="central"
              font-family="-apple-system, BlinkMacSystemFont, sans-serif"
              font-size="{{ ofs }}" fill="#1e293b" font-weight="600"
              paint-order="stroke" stroke="#ffffff" stroke-width="{{ ofs * 0.14 }}"
              style="user-select: none">{{ m.name }}</text>
        {% endif %}
      </g>
      {% endif %}

# =============================================================================
# Calculators
# =============================================================================
calculators:

  terrace:
    label: Kalkulátor terasy
    icon: o_calculate
    inputModel: TerraceConfig
    instanceNoun: Varianta
    description: Krok za krokem — materiál, rozměry, podkonstrukce a kusovník terasy.
    allowDuplicate: true
    form:
      steps:
        - id: material
          label: Materiál
          description: Zvolte materiál povrchu, rozměry prkna a směr pokládky.
          fields: [material, boardColor, layingDirection, boardWidth, boardMaxLength, boardGap, tilePattern]
        - id: rozmery
          label: Rozměry
          description: Zakreslete plochu terasy nástrojem „Plocha terasy“ a výřezy nástrojem „Výřez / překážka“. Hodnoty lze ručně přepsat.
          fields: [deckGrossArea, obstaclesArea, netDeckArea, deckPerimeter]
        - id: podkonstrukce
          label: Podkonstrukce
          fields: [substructureType, joistSpacing, installHeight, substructureBase]
        - id: sluzby
          label: Služby
          fields: [edgeTrim, edgeTrimSides, includeInstallation]
        - id: cenik
          label: Ceník
          description: Ceny položek pro tuto variantu — čte je kusovník i cenová nabídka. Výchozí = standardní ceník.
          fields: [priceWpcAntracit, priceWpcHneda, priceWpcSeda, priceLarch, priceTile, priceSubAlu, priceSubWpc, priceSubWood, pricePedestal, pricePedHigh, priceGeotex, priceClip, priceScrew, priceTrimWpc, priceTrimWood, priceInstall]
        - id: parametry
          label: Parametry
          description: Odhadové konstanty spotřeby materiálu na m², velikosti balení a krycí rozměry.
          fields: [pedestalPerM2Board, pedestalPerM2Tile, stockLength, geotexOverlapPct, clipPerM2, clipPerPack, screwPerM2, screwPerPack, tileArea]
      rules:
        - { field: boardColor,       showWhen: { material: wpc } }
        - { field: boardWidth,       hideWhen: { material: tile } }
        - { field: boardMaxLength,   hideWhen: { material: tile } }
        - { field: boardGap,         hideWhen: { material: tile } }
        - { field: tilePattern,      showWhen: { material: tile } }
        - { field: substructureType, hideWhen: { material: tile } }
        - { field: joistSpacing,     hideWhen: { material: tile } }
        - { field: edgeTrim,         hideWhen: { material: tile } }
        - { field: edgeTrimSides,    showWhen: { edgeTrim: true } }
    outputs: [bom, takeoff, warnings]

# =============================================================================
# Aggregations — signatura (models, instance, compute). Ceny i parametry se
# čtou přímo z varianty (instance) přes priceOf / compute.constants(instance).
# =============================================================================
aggregations:

  # --- Kusovník — kategorizovaný, oceněný -----------------------------------
  terraceBOM:
    params: [models, instance, compute]
    body: |
      var c = instance;
      if (!c) return { columns: [], groups: [], footer: [], metrics: {} };

      var prices = c;   // ceny jsou pole varianty (priceXxx)
      var meta = compute.priceMeta();
      var meas = compute.measuredNet(models, c);
      var grossA = (c.deckGrossArea || 0) > 0 ? c.deckGrossArea : meas.gross;
      var holesA = (c.obstaclesArea || 0) > 0 ? c.obstaclesArea : meas.holes;
      var perimA = (c.deckPerimeter || 0) > 0 ? c.deckPerimeter : meas.perim;
      var net = Math.max(0, grossA - holesA);

      var k = compute.constants(c);
      var isTile = (c.material === 'tile');
      var isWpc  = (c.material === 'wpc');
      var bw = c.boardWidth || 140;
      var bl = c.boardMaxLength || 4000;

      // Dlažba → plošně s koeficientem odpadu; prkna → reálný nářez po řadách.
      var coverArea, unitCount, unitLabel;
      var layout = null;
      if (isTile) {
        coverArea = net * compute.tileWasteFactor(c.tilePattern);
        unitCount = Math.ceil(coverArea / k.tileArea);            // 60×60 dlaždice
        unitLabel = 'Počet dlaždic';
      } else {
        layout = compute.boardLayout(net, bw, bl, c.layingDirection, c.boardGap);
        coverArea = layout.coverArea;                             // m² zakoupených prken vč. nářezu
        unitCount = layout.totalBoards;
        unitLabel = 'Počet prken';
      }

      var deck   = compute.priceOf(meta, prices,compute.deckBoardSku(c.material, c.boardColor));
      var ped    = compute.priceOf(meta, prices, compute.pedestalSku(c.installHeight));
      var instal = compute.priceOf(meta, prices,'SRV-INSTALL');
      // Podklad zemina/štěrk → geotextilie proti plevelu (5 % přesah).
      var isSoil = (c.substructureBase === 'soil');
      var geotex = compute.priceOf(meta, prices, 'GEOTEX');
      var geotexQty = isSoil ? Math.ceil(net * k.geotexOverlap) : 0;

      var total = 0;
      function line(item, qty, unit, unitPrice) {
        var price = qty * unitPrice;
        total += price;
        return { item: item, qty: qty, unit: unit, price: price };
      }
      function sum(rows) { var s = 0; for (var i = 0; i < rows.length; i++) s += rows[i].price; return s; }

      var povrch = [ line(deck.name, Math.round(coverArea * 10) / 10, 'm²', deck.unitPrice) ];
      var groups = [
        { label: 'Povrch', rows: povrch, subtotal: { label: 'Povrch', value: sum(povrch), format: 'currency' } }
      ];

      if (isTile) {
        // Dlažba na rektifikačních terčích — bez nosníků, spon a lišt.
        var pedCountT = Math.ceil(net * k.pedestalPerM2Tile);   // ~3 terče/m² (rošt rohů dlaždic)
        var subRowsT = [ line(ped.name, pedCountT, 'ks', ped.unitPrice) ];
        if (geotexQty > 0) subRowsT.push(line(geotex.name, geotexQty, 'm²', geotex.unitPrice));
        groups.push({ label: 'Podkonstrukce', rows: subRowsT, subtotal: { label: 'Podkonstrukce', value: sum(subRowsT), format: 'currency' } });
      } else {
        // Prkna (WPC/dřevo) na nosnících + spojovací materiál + lišty.
        var joist = compute.priceOf(meta, prices,compute.joistSku(c.substructureType));
        var fast  = compute.priceOf(meta, prices,isWpc ? 'FAST-CLIP-100' : 'FAST-SCREW-250');
        var trim  = compute.priceOf(meta, prices,isWpc ? 'TRIM-WPC' : 'TRIM-WOOD');
        var spacingM = (c.joistSpacing || 500) / 1000;
        var joistPcs = Math.ceil((spacingM > 0 ? net / spacingM : 0) / k.stockLength);
        var pedCount = Math.ceil(net * k.pedestalPerM2Board);
        var fastPacks = isWpc ? Math.ceil(net * k.clipPerM2 / k.clipPerPack) : Math.ceil(net * k.screwPerM2 / k.screwPerPack);
        var trimLen = Math.ceil(perimA * compute.edgeTrimFraction(c.edgeTrim, c.edgeTrimSides));
        var subRows = [
          line(joist.name, joistPcs, 'ks', joist.unitPrice),
          line(ped.name, pedCount, 'ks', ped.unitPrice)
        ];
        if (geotexQty > 0) subRows.push(line(geotex.name, geotexQty, 'm²', geotex.unitPrice));
        groups.push({ label: 'Podkonstrukce', rows: subRows, subtotal: { label: 'Podkonstrukce', value: sum(subRows), format: 'currency' } });
        var fastRows = [ line(fast.name, fastPacks, 'bal', fast.unitPrice) ];
        groups.push({ label: 'Spojovací materiál', rows: fastRows, subtotal: { label: 'Spojovací materiál', value: sum(fastRows), format: 'currency' } });
        if (trimLen > 0) {
          var trimRows = [ line(trim.name, trimLen, 'bm', trim.unitPrice) ];
          groups.push({ label: 'Lišty', rows: trimRows, subtotal: { label: 'Lišty', value: sum(trimRows), format: 'currency' } });
        }
      }

      var installQty = c.includeInstallation ? net : 0;
      if (installQty > 0) {
        var srvRows = [ line(instal.name, Math.round(installQty * 10) / 10, 'm²', instal.unitPrice) ];
        groups.push({ label: 'Služby', rows: srvRows, subtotal: { label: 'Služby', value: sum(srvRows), format: 'currency' } });
      }

      var vat = total * k.vatRate;
      var withVat = total + vat;

      return {
        columns: [
          { key: 'item',  label: 'Položka' },
          { key: 'qty',   label: 'Množství', align: 'right', format: 'number' },
          { key: 'unit',  label: 'J.m.' },
          { key: 'price', label: 'Cena bez DPH', align: 'right', format: 'currency' }
        ],
        groups: groups,
        footer: [
          { label: 'Mezisoučet bez DPH', value: total,   format: 'currency' },
          { label: 'DPH ' + Math.round(k.vatRate * 100) + ' %', value: vat, format: 'currency' },
          { label: 'Celkem s DPH',       value: withVat, format: 'currency' }
        ],
        metrics: {
          totalPrice:  { value: withVat, label: 'Celkem s DPH', unit: 'Kč', format: 'currency' },
          netArea:     { value: Math.round(net * 10) / 10, label: 'Čistá plocha', unit: 'm²' },
          boardCount:  { value: unitCount, label: unitLabel, unit: 'ks' },
          pricePerM2:  { value: net > 0 ? Math.round(withVat / net) : 0, label: 'Cena za m²', unit: 'Kč', format: 'currency' }
        }
      };

  # --- Výkaz výměr — z čísel ve formuláři -----------------------------------
  terraceTakeoff:
    params: [models, instance, compute]
    body: |
      var c = instance;
      if (!c) return { columns: [], groups: [], footer: [] };

      var meas = compute.measuredNet(models, c);
      var gross = (c.deckGrossArea || 0) > 0 ? c.deckGrossArea : meas.gross;
      var holes = (c.obstaclesArea || 0) > 0 ? c.obstaclesArea : meas.holes;
      var perim = (c.deckPerimeter || 0) > 0 ? c.deckPerimeter : meas.perim;
      var net = Math.max(0, gross - holes);
      var k = compute.constants(c);
      var isTile = (c.material === 'tile');
      var bw = c.boardWidth || 140;
      var bl = c.boardMaxLength || 4000;
      var layout = isTile ? null : compute.boardLayout(net, bw, bl, c.layingDirection, c.boardGap);
      var withWaste = isTile ? net * compute.tileWasteFactor(c.tilePattern) : layout.coverArea;
      var wastePct = isTile ? (compute.tileWasteFactor(c.tilePattern) - 1) : layout.wastePct;
      var spacingM = (c.joistSpacing || 500) / 1000;
      var joistLm = spacingM > 0 ? net / spacingM : 0;
      var pedCount = Math.ceil(net * (isTile ? k.pedestalPerM2Tile : k.pedestalPerM2Board));

      // Podkonstrukce: dlažba → terče; prkna → nosníky + terče. Výška nad
      // terénem volí typ terče, podklad zemina/štěrk přidá geotextilii.
      var pedLabel = (c.installHeight || 0) > 6
        ? 'Rektifikační terče vysoké (' + (c.installHeight || 0) + ' cm)'
        : 'Rektifikační terče';
      var geotexQty = (c.substructureBase === 'soil') ? Math.ceil(net * k.geotexOverlap) : 0;
      var subRows = [ { item: 'Obvod terasy', value: Math.round(perim * 10) / 10, unit: 'm' } ];
      if (isTile) {
        subRows.push({ item: pedLabel, value: pedCount, unit: 'ks' });
      } else {
        subRows.push({ item: 'Délka nosníků (rozteč ' + (c.joistSpacing || 500) + ' mm)', value: Math.round(joistLm * 10) / 10, unit: 'bm' });
        subRows.push({ item: pedLabel, value: pedCount, unit: 'ks' });
      }
      if (geotexQty > 0) subRows.push({ item: 'Geotextilie (podklad zemina/štěrk)', value: geotexQty, unit: 'm²' });

      var groups = [
        {
          label: 'Plocha',
          rows: [
            { item: 'Hrubá plocha terasy', value: Math.round(gross * 10) / 10, unit: 'm²' },
            { item: 'Plocha výřezů', value: Math.round(holes * 10) / 10, unit: 'm²' },
            { item: 'Čistá plocha', value: Math.round(net * 10) / 10, unit: 'm²' },
            { item: 'Materiál vč. nářezu/odpadu', value: Math.round(withWaste * 10) / 10, unit: 'm²' }
          ],
          subtotal: { label: 'Čistá plocha', value: Math.round(net * 10) / 10, format: 'number' }
        }
      ];
      if (!isTile && layout) {
        groups.push({
          label: 'Nářez prken (' + bw + ' × ' + bl + ' mm)',
          rows: [
            { item: 'Krytí — běžné metry prken', value: Math.round(layout.linearM * 10) / 10, unit: 'bm' },
            { item: 'Prken k nákupu (rezerva ' + Math.round(layout.allowancePct * 100) + ' %)', value: layout.totalBoards, unit: 'ks' },
            { item: 'Nakoupené běžné metry prken', value: Math.round(layout.purchasedM * 10) / 10, unit: 'bm' },
            { item: 'Odřezky (odpad z nářezu)', value: Math.round(layout.offcutM * 10) / 10, unit: 'bm' }
          ],
          subtotal: { label: 'Prken k nákupu', value: layout.totalBoards, format: 'number' }
        });
      }
      groups.push({ label: 'Obvod a podkonstrukce', rows: subRows });

      return {
        columns: [
          { key: 'item',  label: 'Položka' },
          { key: 'value', label: 'Hodnota', align: 'right', format: 'number' },
          { key: 'unit',  label: 'J.m.' }
        ],
        groups: groups,
        footer: [
          { label: isTile ? 'Odpad pro tento vzor dlažby' : 'Odpad z nářezu prken',
            value: Math.round(wastePct * 100) + ' %' }
        ]
      };

  # --- Kontrola vstupů — upozornění na netypické / nesmyslné kombinace -------
  # Naplňuje UX princip „vzdělávání v kontextu" a F5 (poznámky k výsledku).
  # Nikdy neblokuje průchod — jen informuje (Varování / Info).
  terraceWarnings:
    params: [models, instance, compute]
    body: |
      var c = instance;
      if (!c) return { columns: [], rows: [], metrics: {} };

      var meas = compute.measuredNet(models, c);
      var gross = (c.deckGrossArea || 0) > 0 ? c.deckGrossArea : meas.gross;
      var holes = (c.obstaclesArea || 0) > 0 ? c.obstaclesArea : meas.holes;
      var net = Math.max(0, gross - holes);
      var isTile = (c.material === 'tile');
      var isWpc = (c.material === 'wpc');

      var rows = [];
      function warn(msg) { rows.push({ level: 'Varování', icon: '⚠', message: msg }); }
      function info(msg) { rows.push({ level: 'Info', icon: 'ℹ', message: msg }); }

      // -- Plocha ---------------------------------------------------------
      if (net <= 0) {
        warn('Není zadána žádná plocha terasy — zakreslete ji nástrojem „Plocha terasy“ nebo zadejte rozměry ručně v kroku Rozměry.');
      }
      if (gross > 0 && holes >= gross) {
        warn('Plocha výřezů (' + (Math.round(holes * 10) / 10) + ' m²) je větší nebo rovna ploše terasy (' + (Math.round(gross * 10) / 10) + ' m²) — zkontrolujte zakreslení.');
      }
      if (net > 100) {
        info('Velká plocha (' + (Math.round(net * 10) / 10) + ' m²) — u rozsáhlých teras zvažte dilatační spáry v ploše a únosnost podkladu (mimo rozsah kalkulátoru).');
      }

      // -- Podkonstrukce (jen prkna) --------------------------------------
      if (!isTile) {
        var sp = c.joistSpacing || 500;
        if (isWpc && sp > 500) {
          warn('Rozteč nosníků ' + sp + ' mm je pro WPC prkna velká — doporučeno max. 400–500 mm (riziko průhybu).');
        }
        if (!isWpc && sp > 600) {
          warn('Rozteč nosníků ' + sp + ' mm je pro dřevěná prkna velká — doporučeno max. 600 mm.');
        }
      }

      // -- Výška nad terénem ----------------------------------------------
      var h = c.installHeight || 0;
      if (h > 15) {
        warn('Výška ' + h + ' cm přesahuje rozsah běžných rektifikačních terčů (do ~15 cm) — počítejte se zděnými/betonovými podpěrami nebo terči s podpěrnou trubkou.');
      }

      // -- Dilatační mezera (ručně přepsatelná mimo 4–8 mm) ---------------
      var gap = c.boardGap;
      if (!isTile && gap != null && (gap < 4 || gap > 8)) {
        warn('Dilatační mezera ' + gap + ' mm je mimo doporučený rozsah 4–8 mm.');
      }

      // -- Pokládka / odpad -----------------------------------------------
      if (!isTile && c.layingDirection === 'diagonal') {
        info('Diagonální pokládka zvyšuje odpad prken o ~15 % oproti podélné.');
      }
      if (isTile && (c.tilePattern === 'rybikost' || c.tilePattern === 'diag45')) {
        info('Zvolený vzor dlažby zvyšuje odpad z řezání (~15 %).');
      }

      // -- Materiál / podklad ---------------------------------------------
      if (c.material === 'larch') {
        info('Přírodní modřín vyžaduje pravidelnou údržbu (olejování).');
      }
      if (c.substructureBase === 'soil') {
        info('Podklad zemina/štěrk — počítejte se zhutněným a odvodněným podložím; v kusovníku je geotextilie proti plevelu.');
      }

      if (rows.length === 0) {
        rows.push({ level: 'OK', icon: '✓', message: 'Bez připomínek — zadané hodnoty jsou v obvyklém rozsahu.' });
      }

      var warnCount = 0;
      for (var i = 0; i < rows.length; i++) { if (rows[i].level === 'Varování') warnCount++; }

      return {
        columns: [
          { key: 'icon',    label: '' },
          { key: 'level',   label: 'Závažnost' },
          { key: 'message', label: 'Upozornění' }
        ],
        rows: rows,
        metrics: {
          warningCount: { value: warnCount, label: 'Počet varování', unit: '' }
        }
      };

# =============================================================================
# Views
# =============================================================================
views:

  - id: bom
    label: Kusovník
    icon: o_receipt_long
    aggregation: terraceBOM
    layout:
      - { type: metrics, source: terraceBOM.metrics }
      - { type: table,   source: terraceBOM, groupBy: category }

  - id: takeoff
    label: Výkaz výměr
    icon: o_straighten
    aggregation: terraceTakeoff
    layout:
      - { type: table, source: terraceTakeoff, groupBy: section }

  - id: warnings
    label: Kontrola
    icon: o_warning
    aggregation: terraceWarnings
    layout:
      - { type: metrics, source: terraceWarnings.metrics }
      - { type: table,   source: terraceWarnings }

# =============================================================================
# Panels — cenová nabídka TerasProfi s.r.o. (FIKTIVNÍ placeholder)
# Veškeré CSS inline; žádné externí URL (render_preview by je odmítl).
# =============================================================================
panels:

  - id: quote
    label: Cenová nabídka
    icon: o_description
    description: Brandovaná cenová nabídka TerasProfi s.r.o. — z konfigurace a zakreslené plochy.
    template: |
      <style>
        .tp { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
              color: #1a1a1a; line-height: 1.5; max-width: 720px; background: #fff;
              padding: 24px 28px; box-sizing: border-box; border: 1px solid #e0e0e0;
              border-radius: 4px; }
        .tp-header { display: flex; align-items: center; gap: 16px;
                     border-bottom: 3px solid #b8763e; padding-bottom: 16px; margin-bottom: 20px; }
        .tp-logo { width: 56px; height: 56px; border-radius: 12px;
                   background: linear-gradient(135deg, #c2884a 0%, #8a5a2b 100%);
                   color: #fff; font-weight: 700; font-size: 30px; display: flex;
                   align-items: center; justify-content: center;
                   box-shadow: 0 2px 4px rgba(138, 90, 43, 0.35); }
        .tp-brand { flex: 1; }
        .tp-brand h1 { margin: 0 0 4px; font-size: 22px; color: #6b3f17; }
        .tp-brand p  { margin: 0; color: #78909C; font-size: 12px; }
        .tp-meta  { font-size: 12px; color: #78909C; text-align: right; }
        .tp-meta strong { color: #1a1a1a; font-size: 14px; display: block; }
        .tp-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 16px 0; }
        .tp-kpis div { background: #f6ede2; padding: 12px 8px; border-radius: 4px; text-align: center; }
        .tp-kpis span { display: block; font-size: 10px; color: #6b3f17;
                        text-transform: uppercase; letter-spacing: 0.5px; }
        .tp-kpis strong { font-size: 17px; color: #1a1a1a; font-weight: 600; }
        .tp-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        .tp-table th { text-align: left; background: #efe6da; padding: 8px 10px;
                       font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b3f17; }
        .tp-table td { padding: 8px 10px; border-bottom: 1px solid #efe6da; font-size: 13px; }
        .tp-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
        .tp-totals { background: #f6ede2; padding: 16px; border-radius: 4px; margin-top: 12px; }
        .tp-totals .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
        .tp-totals .row.grand { border-top: 2px solid #b8763e; margin-top: 8px; padding-top: 8px;
                                font-size: 15px; font-weight: 700; color: #6b3f17; }
        .tp-sign { display: flex; justify-content: space-between; margin-top: 28px; gap: 24px; }
        .tp-sign div { flex: 1; border-top: 1px solid #d6c3ab; padding-top: 8px;
                       font-size: 11px; color: #78909C; text-align: center; }
        .tp-footer { margin-top: 20px; padding-top: 12px; border-top: 1px solid #efe6da;
                     font-size: 11px; color: #90a4ae; }
        .tp-empty { padding: 40px 20px; text-align: center; color: #78909C; font-size: 14px;
                    background: #FAFAFA; border-radius: 4px; border: 1px dashed #d6c3ab; }
        .tp-toolbar { display: flex; justify-content: flex-end; margin-bottom: 12px; }
        .tp-print-btn { font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
                        border: 1px solid #b8763e; background: #b8763e; color: #fff;
                        padding: 8px 16px; border-radius: 4px; }
        .tp-print-btn:hover { background: #8a5a2b; border-color: #8a5a2b; }
        /* Tisk / uložit PDF — čistá A4, skryté tlačítko, věrné barvy. */
        @media print {
          @page { size: A4; margin: 14mm; }
          body { background: #fff; margin: 0; }
          .tp-toolbar { display: none !important; }
          .tp { max-width: none; border: none; border-radius: 0; padding: 0;
                -webkit-print-color-adjust: exact; print-color-adjust: exact; }
          .tp-kpis div, .tp-table th, .tp-totals, .tp-logo {
                -webkit-print-color-adjust: exact; print-color-adjust: exact; }
          .tp-table tr, .tp-sign { page-break-inside: avoid; }
        }
      </style>
      <div class="tp">
        {% if hasConfig %}
        <div class="tp-toolbar">
          <button type="button" class="tp-print-btn" onclick="window.print()">🖨 Tisk / uložit PDF</button>
        </div>
        {% endif %}
        <div class="tp-header">
          <div class="tp-logo">T</div>
          <div class="tp-brand">
            <h1>TerasProfi s.r.o.</h1>
            <p>Terasy na míru — WPC i přírodní dřevo · PlanTeras.cz</p>
          </div>
          <div class="tp-meta">
            <strong>{{ quoteNumber }}</strong>
            {{ date }}<br/>
            platnost do {{ validUntil }}
          </div>
        </div>

        {% if not hasConfig %}
        <div class="tp-empty">
          Otevřete kalkulátor „Kalkulátor terasy“, vyplňte variantu a zakreslete
          plochu terasy nástrojem „Plocha terasy“.
        </div>
        {% else %}

        <div class="tp-kpis">
          <div><span>Materiál</span><strong>{{ materialLabel }}</strong></div>
          <div><span>Čistá plocha</span><strong>{{ netArea }} m²</strong></div>
          <div><span>{{ boardCountLabel }}</span><strong>{{ boardCount }}</strong></div>
          <div><span>Cena za m²</span><strong>{{ pricePerM2 }} Kč</strong></div>
        </div>

        <table class="tp-table">
          <thead>
            <tr><th>Položka</th><th class="num">Množství</th><th>J.m.</th><th class="num">Cena bez DPH</th></tr>
          </thead>
          <tbody>
            {% for line in bidLines %}
            <tr>
              <td>{{ line.item }}</td>
              <td class="num">{{ line.qty }}</td>
              <td>{{ line.unit }}</td>
              <td class="num">{{ line.price | round(0) }} Kč</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>

        <div class="tp-totals">
          <div class="row"><span>Mezisoučet bez DPH</span><span>{{ subtotal | round(0) }} Kč</span></div>
          <div class="row"><span>DPH {{ vatPct }} %</span><span>{{ vat | round(0) }} Kč</span></div>
          <div class="row grand"><span>Celkem s DPH</span><span>{{ total | round(0) }} Kč</span></div>
        </div>

        <div class="tp-sign">
          <div>Dodavatel<br/>TerasProfi s.r.o.</div>
          <div>Objednatel<br/>{{ projectName }}</div>
        </div>

        {% endif %}

        <div class="tp-footer">
          Nabídka platí 30 dní od data vystavení. Ceny jsou orientační a nejsou
          závaznou nabídkou. TerasProfi s.r.o. je fiktivní firma (ukázka).
        </div>
      </div>
    body: |
      var pid = projectId;
      var configs = (models.TerraceConfig || []).filter(function (r) { return r.project_id === pid; });
      var surfaces = (models.TerraceSurface || []).filter(function (r) { return r.project_id === pid; });
      var obstacles = (models.TerraceObstacle || []).filter(function (r) { return r.project_id === pid; });
      var meta = compute.priceMeta();

      var now = new Date();
      function pad(n) { return n < 10 ? '0' + n : '' + n; }
      var date = pad(now.getDate()) + '. ' + pad(now.getMonth() + 1) + '. ' + now.getFullYear();
      var validD = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);
      var validUntil = pad(validD.getDate()) + '. ' + pad(validD.getMonth() + 1) + '. ' + validD.getFullYear();
      var quoteNumber = 'TP-' + now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate());

      var c = configs[0] || null;
      if (!c) {
        return { hasConfig: false, quoteNumber: quoteNumber, date: date, validUntil: validUntil,
                 projectName: (project && project.name) || 'Projekt' };
      }

      function priceOf(sku) { return compute.priceOf(meta, c, sku); }   // ceny z varianty

      // Měřené hodnoty z výkresu — počítáno přímo z geometrie (v panelu se
      // na řádcích modelu nevyhodnocují derivace, proto přes geo + compute).
      var measGross = 0;
      for (var i = 0; i < surfaces.length; i++) {
        var sIds = surfaces[i].regionGeometryIds || [];
        for (var si = 0; si < sIds.length; si++) {
          var sg = geo(sIds[si]);
          if (sg) measGross += compute.geometryArea(sg) / (1000 * 1000);
        }
      }
      var measHoles = 0;
      for (var j = 0; j < obstacles.length; j++) {
        var og = geo(obstacles[j].drivingGeometryId);
        if (og) measHoles += compute.geometryArea(og) / (1000 * 1000);
      }
      var measPerim = 0;
      for (var sk = 0; sk < surfaces.length; sk++) {
        var pIds = surfaces[sk].regionGeometryIds || [];
        for (var pi = 0; pi < pIds.length; pi++) {
          var pg = geo(pIds[pi]);
          if (pg) measPerim += compute.geometryPerimeter(pg) / 1000;
        }
      }

      var gross = (c.deckGrossArea || 0) > 0 ? c.deckGrossArea : measGross;
      var holes = (c.obstaclesArea || 0) > 0 ? c.obstaclesArea : measHoles;
      var perim = (c.deckPerimeter || 0) > 0 ? c.deckPerimeter : measPerim;
      var net = Math.max(0, gross - holes);

      var k = compute.constants(c);
      var isTile = (c.material === 'tile');
      var isWpc = (c.material === 'wpc');
      var bw = c.boardWidth || 140;
      var bl = c.boardMaxLength || 4000;
      // Dlažba → plošně s odpadem; prkna → reálný nářez po řadách (sdílená computation).
      var deckArea, boardCount;
      if (isTile) {
        deckArea = net * compute.tileWasteFactor(c.tilePattern);
        boardCount = Math.ceil(deckArea / k.tileArea);
      } else {
        var layout = compute.boardLayout(net, bw, bl, c.layingDirection, c.boardGap);
        deckArea = layout.coverArea;
        boardCount = layout.totalBoards;
      }

      var deck = priceOf(compute.deckBoardSku(c.material, c.boardColor));
      var ped = priceOf(compute.pedestalSku(c.installHeight));
      var instal = priceOf('SRV-INSTALL');
      var isSoil = (c.substructureBase === 'soil');
      var geotex = priceOf('GEOTEX');
      var geotexQty = isSoil ? Math.ceil(net * k.geotexOverlap) : 0;

      var bidLines = [];
      var subtotal = 0;
      function line(item, qty, unit, unitPrice) {
        if (qty <= 0) return;
        var price = qty * unitPrice;
        subtotal += price;
        bidLines.push({ item: item, qty: qty, unit: unit, price: price });
      }
      line(deck.name, Math.round(deckArea * 10) / 10, 'm²', deck.unitPrice);
      if (isTile) {
        line(ped.name, Math.ceil(net * k.pedestalPerM2Tile), 'ks', ped.unitPrice);
      } else {
        var joist = priceOf(compute.joistSku(c.substructureType));
        var fast = priceOf(isWpc ? 'FAST-CLIP-100' : 'FAST-SCREW-250');
        var trim = priceOf(isWpc ? 'TRIM-WPC' : 'TRIM-WOOD');
        var spacingM = (c.joistSpacing || 500) / 1000;
        var joistPcs = Math.ceil((spacingM > 0 ? net / spacingM : 0) / k.stockLength);
        var fastPacks = isWpc ? Math.ceil(net * k.clipPerM2 / k.clipPerPack) : Math.ceil(net * k.screwPerM2 / k.screwPerPack);
        var trimLen = Math.ceil(perim * compute.edgeTrimFraction(c.edgeTrim, c.edgeTrimSides));
        line(joist.name, joistPcs, 'ks', joist.unitPrice);
        line(ped.name, Math.ceil(net * k.pedestalPerM2Board), 'ks', ped.unitPrice);
        line(fast.name, fastPacks, 'bal', fast.unitPrice);
        if (trimLen > 0) line(trim.name, trimLen, 'bm', trim.unitPrice);
      }
      if (geotexQty > 0) line(geotex.name, geotexQty, 'm²', geotex.unitPrice);
      if (c.includeInstallation) line(instal.name, Math.round(net * 10) / 10, 'm²', instal.unitPrice);

      var vat = subtotal * k.vatRate;
      var total = subtotal + vat;
      var materialLabel = isTile ? 'Betonová dlažba' : (isWpc ? 'WPC kompozit' : 'Sibiřský modřín');

      return {
        hasConfig: true,
        quoteNumber: quoteNumber,
        date: date,
        validUntil: validUntil,
        projectName: (project && project.name) || 'Projekt',
        materialLabel: materialLabel,
        netArea: Math.round(net * 10) / 10,
        boardCount: boardCount,
        boardCountLabel: isTile ? 'Počet dlaždic' : 'Počet prken',
        pricePerM2: net > 0 ? Math.round(total / net) : 0,
        bidLines: bidLines,
        subtotal: subtotal,
        vat: vat,
        vatPct: Math.round(k.vatRate * 100),
        total: total
      };
